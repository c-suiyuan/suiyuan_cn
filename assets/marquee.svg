<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="260" viewBox="0 0 1200 260" fill="none">
  <style>
    @keyframes scroll-left {
      from { transform: translateX(0); }
      to { transform: translateX(-50%); }
    }
    @keyframes scroll-right {
      from { transform: translateX(-50%); }
      to { transform: translateX(0); }
    }
    .row {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: pre;
    }
    .scroll-left { animation: scroll-left linear infinite; }
    .scroll-right { animation: scroll-right linear infinite; }
    .r1 { animation-duration: 38s; }
    .r2 { animation-duration: 32s; }
    .r3 { animation-duration: 44s; }
    .r4 { animation-duration: 36s; }
    .r5 { animation-duration: 40s; }
  </style>

  <defs>
